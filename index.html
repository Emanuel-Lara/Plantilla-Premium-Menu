<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna Café | Menú Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-content">
            <div class="logo-redondo">
                <img src="logo.png" alt="Luna Café Logo">
            </div>
            <h1>LUNA CAFÉ</h1>
            <div class="badge-premium">EDICIÓN EXCLUSIVA</div>
        </div>
    </header>

    <div class="contenedor-cartel-navegacion">
    <div class="cartel-madera-metal">
        
        <div class="header-cartel">
            <h1 class="titulo-cartel">LUNA CAFÉ</h1>
        </div>
        
        <div class="separador-cartel"></div>
        
        <nav class="barra-filtros-premium">
            <div class="scroll-wrapper">
                <button class="filtro-btn activo" onclick="filtrar('todos', event)">
                    <div class="btn-content"><span class="icon"></span><span>TODOS</span></div>
                </button>
                <button class="filtro-btn" onclick="filtrar('cafes', event)">
                    <div class="btn-content"><span class="icon"></span><span>CAFÉS</span></div>
                </button>
                <button class="filtro-btn" onclick="filtrar('desayunos', event)"> <div class="btn-content"><span class="icon"></span><span>DESAYUNOS</span></div>
                </button>
                <button class="filtro-btn" onclick="filtrar('almuerzos', event)"> <div class="btn-content"><span class="icon"></span><span>ALMUERZOS</span></div>
                </button>
                <button class="filtro-btn" onclick="filtrar('postres', event)">
                    <div class="btn-content"><span class="icon"></span><span>POSTRES</span></div>
                </button>
                <button class="filtro-btn" onclick="filtrar('bebidas', event)">
                    <div class="btn-content"><span class="icon"></span><span>BEBIDAS</span></div>
                </button>
            </div>
        </nav>
    </div>
</div>

<div class="seccion-promos-premium">
    <div class="tarjeta-promo-dorada">
        <div class="promo-badge">OFERTA ESPECIAL</div>
        <div class="promo-contenido">
            <h2 class="promo-titulo">PROMO TARDE DE CAFÉ</h2>
            <p class="promo-descripcion">2 Capuccinos Medianos + 2 Porciones de Torta</p>
            <div class="promo-precio">
                <span class="precio-antes">15$</span>
                <span class="precio-ahora">10$</span>
            </div>
        </div>
        <div class="promo-brillo"></div>
    </div>
</div>

    <main id="menu-container">
        </main>

    <div id="miModal" class="modal">
        <div class="modal-contenido">
            <span class="cerrar" onclick="cerrarModal()">&times;</span>
            <img id="modal-img" src="" alt="Producto">
            <div class="modal-body">
                <h2 id="modal-titulo"></h2>
                <p id="modal-descripcion"></p>
                <div class="modal-footer">
                    <span id="modal-precio"></span>
                    <button id="btn-wa-modal" class="btn-wa">Pedir por WhatsApp</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Luna Café - Punto Fijo, Falcón</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
